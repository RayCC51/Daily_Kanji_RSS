name: Daily Kanji RSS Update

on:
  schedule:
    - cron: '0 20 * * *' # 매일 KST 아침 5시
  workflow_dispatch:

# 깃허브 페이지 직접 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. 이전 날짜 진도(current_day.txt) 복원 (캐시 이용)
    - name: Restore current day cache
      uses: actions/cache/restore@v4
      with:
        path: ./current_day.txt
        key: kanji-day-cache

    - name: Make script executable
      run: chmod +x ./newfeed.sh

    # 2. 스크립트 실행 (rss.xml 생성 및 current_day.txt 업데이트)
    - name: Run newfeed script
      run: ./newfeed.sh

    # 3. 오늘 바뀐 진도(current_day.txt)를 다음 날을 위해 캐시에 다시 저장
    - name: Save current day cache
      uses: actions/cache/save@v4
      with:
        path: ./current_day.txt
        key: kanji-day-cache

    # 4. 배포할 파일들을 아티팩트로 묶기 (루트 폴더 전체)
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'web' # index.html, rss.xml

    # 5. 깃허브 페이지 서버로 다이렉트 쏴서 배포 시키기 (커밋 이력 안 남음)
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
