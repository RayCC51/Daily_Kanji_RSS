name: Daily Kanji RSS Update

on:
  schedule:
    - cron: '0 20 * * *' # 매일 KST 아침 5시 실행
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # 구형 Node 버전 실행 허용

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # [날짜 추출] KST 기준 '일(DD)' 정보만 가져오기 (01~31)
    - name: Get current day (DD)
      id: get-date
      run: echo "day=$(date -d '+9 hours' +'%d')" >> $GITHUB_OUTPUT

    # [캐시 복원] 어제 저장된 진도 파일 가져오기
    - name: Restore current day cache
      uses: actions/cache/restore@v4
      with:
        path: ./current_day.txt
        key: kanji-cache-${{ steps.get-date.outputs.day }} # 오늘 날짜(DD) 캐시 탐색
        restore-keys: |
          kanji-cache- # 오늘 자 캐시가 없으면 가장 최근의 과거 캐시를 자동 매칭

    - name: Make script executable
      run: chmod +x ./newfeed.sh

    # [스크립트] RSS 생성 및 current_day.txt 업데이트
    - name: Run newfeed script
      run: ./newfeed.sh

    # [캐시 저장] 오늘 업데이트된 진도 파일을 고유 키로 저장 (충돌 방지)
    - name: Save current day cache
      uses: actions/cache/save@v4
      with:
        path: ./current_day.txt
        key: kanji-cache-${{ steps.get-date.outputs.day }} # kanji-cache-DD 형식으로 저장
    
    # [빌드] 배포용 아티팩트 생성
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'web'

    # [배포] 깃허브 페이지 서버로 다이렉트 배포 (커밋 로그 미생성)
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v5
