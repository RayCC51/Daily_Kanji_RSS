name: Daily Kanji RSS Update

on:
  schedule:
    - cron: '0 20 * * *' # 매일 KST 아침 5시 실행
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # 구형 Node 버전 실행 허용

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
    # 1. 내 레포지토리 소스코드 다운로드
    - name: Checkout repository
      uses: actions/checkout@v4

    # [파일 다운로드] 에러/타임아웃 발생 시 완전히 무시하고 진행
    - name: Fetch current progress from GitHub Pages
      run: |
        # -f (--fail): 404 에러 발생 시 아예 아웃풋 파일(-o)을 생성하지 않습니다.
        # --connect-timeout 5: 서버 연결 대기 시간 최대 5초
        # -m 10: 전체 다운로드 시간 최대 10초 제한 (무한 대기 방지)
        # || true: 에러가 나거나 파일이 없어도 무조건 성공 처리하고 넘어감
        curl -s -f --connect-timeout 5 -m 10 "https://raycc51.github.io/daily-kanji-rss/current_day.txt" -o ./web/current_day.txt || true

    # [내용 확인] 다운로드된 파일이 있으면 터미널 로그에 출력
    - name: Display current day file content
      run: |
        # 파일이 존재할 때만 cat 명령어를 실행하여 에러 방지
        [ -f ./web/current_day.txt ] && cat ./web/current_day.txt || echo "가져온 파일이 없으므로 출력을 생략합니다."

    - name: Make script executable
      run: chmod +x ./newfeed.sh

    # 2. 스크립트 실행 (파일이 없으면 스크립트 내부 디폴트 작동)
    - name: Run newfeed script
      run: ./newfeed.sh

    # 3. 신규 RSS와 최신 current_day.txt가 포함된 web 폴더를 아티팩트로 압축
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'web'

    # 4. 깃허브 페이지 서버로 최종 배포 (커밋 로그 깨끗함)
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v5
